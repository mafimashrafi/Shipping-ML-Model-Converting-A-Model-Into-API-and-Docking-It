services:
  backend:
    build: .
    image: mashrafirahman/model_to_api-backend:latest 
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/Backend 
    command: uvicorn Backend.app:app --host 0.0.0.0 --port 8000

  frontend:
    build: .
    image: mashrafirahman/model_to_api-frontend:latest 
    ports:
      - "8501:8501"
    command: streamlit run Frontend/frontend.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - backend